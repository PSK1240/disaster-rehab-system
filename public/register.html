<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Register for the Post-Disaster Rehabilitation Coordination System" />
  <title>Register | Disaster Rehab System</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
  <div class="login-container" style="min-height: 100vh; padding: 40px 20px;">
    <div class="login-card" style="width: 100%; max-width: 500px;">
      <!-- Header -->
      <div class="login-header">
        <span class="app-icon">🛡️</span>
        <h1>Register</h1>
        <p>Join the Disaster Rehab System</p>
      </div>

      <!-- Alert Message -->
      <div id="alert-msg" class="alert"></div>

      <!-- Register Form -->
      <form id="register-form">
        <div class="form-group">
          <label for="username">Username *</label>
          <input type="text" id="username" class="form-control" placeholder="Choose a username" required />
        </div>
        <div class="form-group">
          <label for="password">Password *</label>
          <input type="password" id="password" class="form-control" placeholder="Create a password" required />
        </div>
        <div class="form-group">
          <label for="role">Role *</label>
          <select id="role" class="form-control" required onchange="toggleRoleFields()">
            <option value="citizen">Citizen</option>
            <option value="ngo">NGO</option>
            <option value="government">Government Official</option>
          </select>
        </div>
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" class="form-control" placeholder="Enter your full name" />
        </div>
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="text" id="phone" class="form-control" placeholder="Enter your phone number" />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="form-control" placeholder="Enter your email" />
        </div>
        <div class="form-group" id="organization-group" style="display: none;">
          <label for="organization">Organization Name</label>
          <input type="text" id="organization" class="form-control" placeholder="Enter your organization name" />
        </div>
        <div class="form-group">
          <label for="address">Address / Location</label>
          <input type="text" id="address" class="form-control" placeholder="Enter your address" />
        </div>

        <button type="submit" class="btn btn-primary" style="margin-top: 15px;">📝 Register</button>
        <p style="text-align: center; margin-top: 15px;">
          Already have an account? <a href="/login.html" style="color: var(--clr-primary);">Sign In</a>
        </p>
      </form>
    </div>
  </div>

  <script src="/js/register.js"></script>
</body>

</html>
