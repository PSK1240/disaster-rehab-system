<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Disaster Rehab</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="login-container">
  <div class="login-card">

    <!-- Header -->
    <div class="login-header">
      <span class="app-icon">🌍</span>
      <h1>Disaster Rehab System</h1>
      <p>Login to continue</p>
    </div>

    <!-- Alert -->
    <div id="alert-msg" class="alert"></div>

    <!-- ================= LOGIN FORM ================= -->
    <form id="login-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" class="form-control" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" class="form-control" required>
      </div>

      <button type="submit" class="btn btn-primary">
        🔐 Login
      </button>
    </form>

    <!-- ================= REGISTER BUTTON ================= -->
    <button 
      class="btn btn-outline" 
      style="width:100%; margin-top:10px;"
      onclick="showRegister()"
    >
      ➕ New user? Register here
    </button>

    <!-- ================= REGISTER FORM ================= -->
    <form id="registerForm" style="display:none; margin-top:15px;">
      
      <div class="form-group">
        <input id="reg_username" class="form-control" placeholder="Username" required>
      </div>

      <div class="form-group">
        <input id="reg_fullname" class="form-control" placeholder="Full Name">
      </div>

      <div class="form-group">
        <input id="reg_phone" class="form-control" placeholder="Phone">
      </div>

      <div class="form-group">
        <input id="reg_email" class="form-control" placeholder="Email">
      </div>

      <div class="form-group">
        <input id="reg_password" type="password" class="form-control" placeholder="Password">
      </div>

      <div class="form-group">
        <select id="reg_role" class="form-control">
          <option value="citizen">Citizen</option>
          <option value="ngo">NGO</option>
        </select>
      </div>

      <div class="form-group">
        <input id="reg_org" class="form-control" placeholder="Organization (for NGO)">
      </div>

      <div class="form-group">
        <input id="reg_address" class="form-control" placeholder="Address">
      </div>

      <button 
        type="button" 
        class="btn btn-success" 
        style="width:100%; margin-top:10px;"
        onclick="register()"
      >
        ✅ Register
      </button>

    </form>

    <!-- Demo Accounts -->
    <div class="test-creds">
      <h4>Test Accounts</h4>
      <div class="cred-item">
        <span>Government</span>
        <code>admin / admin123</code>
      </div>
      <div class="cred-item">
        <span>NGO</span>
        <code>ngo_hope / hope123</code>
      </div>
      <div class="cred-item">
        <span>Citizen</span>
        <code>citizen1 / citizen123</code>
      </div>
    </div>

  </div>
</div>

<!-- JS -->
<script src="/js/login.js"></script>

</body>
</html>
